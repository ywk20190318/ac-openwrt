name: nn6000v2_6.11

on:
  workflow_dispatch:

env:
  DEVICE_MODEL: link_nn6000v2_immwrt
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # 新增：指定目标内核版本
  TARGET_KERNEL_VERSION: 6.11  

jobs:
  build:
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge && sudo -E apt -yqq autoclean && sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./nn6000v2/configs/${{ env.DEVICE_MODEL }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          chmod +x ./nn6000v2/scripts/pre_clone_action.sh ./nn6000v2/scripts/update.sh ./nn6000v2/scripts/build.sh
          ./nn6000v2/scripts/pre_clone_action.sh ${{ env.DEVICE_MODEL }}

      # 新增：强制指定内核版本
      - name: Force Specific Kernel Version
        run: |
          # 进入OpenWrt源码目录（需根据实际路径调整，此处假设源码在action_build下）
          cd ./action_build
          # 修改目标平台的Makefile，指定内核版本
          # 注意：需替换为你设备对应的target路径（如x86/64、ramips/mt7621等）
          # 可通过查看configs/${DEVICE_MODEL}.ini中的TARGET_ARCH等参数确定路径
          TARGET_PATH="target/linux/$(grep -oP 'TARGET_ARCH=\K.*' ../nn6000v2/configs/${{ env.DEVICE_MODEL }}.ini)"
          echo "Target kernel path: $TARGET_PATH"
          
          # 修改Makefile中的KERNEL_PATCHVER变量为6.11
          sed -i "s/^KERNEL_PATCHVER.*/KERNEL_PATCHVER:=${{ env.TARGET_KERNEL_VERSION }}/" "$TARGET_PATH/Makefile"
          
          # 验证修改是否生效
          grep "KERNEL_PATCHVER" "$TARGET_PATH/Makefile"

      - name: Cache Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./nn6000v2/scripts/build.sh ${{ env.DEVICE_MODEL }}

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="


      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 88888888" >> release_body.txt
          echo "LAN地址: 10.0.0.1" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
